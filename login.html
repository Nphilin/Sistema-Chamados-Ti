<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sistema de Chamados de TI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Sistema de Chamados de TI</h1>
    <p>Acesse o painel para registrar e acompanhar chamados técnicos.</p>

    <div class="login-tabs">
      <button id="tabLogin" class="tab-btn active" type="button">Entrar</button>
      <button id="tabCadastro" class="tab-btn" type="button">Cadastrar</button>
    </div>

    <div id="loginAlert" class="login-alert"></div>

    <form id="formLogin">
      <div class="form-group">
        <label for="loginUsuario">Usuário</label>
        <input id="loginUsuario" type="text" placeholder="Digite seu usuário" required />
      </div>

      <div class="form-group">
        <label for="loginSenha">Senha</label>
        <input id="loginSenha" type="password" placeholder="Digite sua senha" required />
      </div>

      <button class="btn btn-primary" type="submit">Entrar no sistema</button>
    </form>

    <form id="formCadastro" style="display: none;">
      <div class="form-group">
        <label for="cadastroNome">Nome completo</label>
        <input id="cadastroNome" type="text" placeholder="Ex: Herbert Taylor" required />
      </div>

      <div class="form-group">
        <label for="cadastroUsuario">Usuário</label>
        <input id="cadastroUsuario" type="text" placeholder="Crie um usuário" required />
      </div>

      <div class="form-group">
        <label for="cadastroSenha">Senha</label>
        <input id="cadastroSenha" type="password" placeholder="Mínimo 4 caracteres" required />
      </div>

      <button class="btn btn-primary" type="submit">Cadastrar usuário</button>
    </form>

    <p style="margin-top: 18px; font-size: 13px;">
      Usuário inicial: <strong>admin</strong> | Senha: <strong>123456</strong>
    </p>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
